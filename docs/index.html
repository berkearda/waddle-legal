<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waddle - Focus Timer | Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1A1A2E;
      background: #E8F4FD;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    .app-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .tagline {
      font-size: 15px;
      color: #64748B;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .links a {
      display: block;
      padding: 14px 20px;
      background: #E8F4FD;
      color: #2196F3;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #D0EBFB;
    }
    .divider {
      height: 1px;
      background: #E2E8F0;
      margin-bottom: 24px;
    }
    .support-label {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .support-email a {
      color: #2196F3;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
    }
    .support-email a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon">&#x1F427;</div>
    <h1>Waddle - Focus Timer</h1>
    <p class="tagline">Stay focused. Earn fish. Grow your penguin world.</p>

    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
    </div>

    <div class="divider"></div>

    <p class="support-label">Support</p>
    <p class="support-email"><a href="mailto:berke.arda@outlook.com">berke.arda@outlook.com</a></p>
  </div>
</body>
</html>
